<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <!-- Green glow gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88"/>
      <stop offset="100%" style="stop-color:#25D366"/>
    </linearGradient>
    <!-- Cyan glow -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF"/>
      <stop offset="100%" style="stop-color:#0088FF"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bgGrad)" rx="18"/>

  <!-- Border glow -->
  <rect width="598" height="298" x="1" y="1" fill="none" stroke="#25D366" stroke-width="1.5" rx="17" opacity="0.5"/>
  <rect width="594" height="294" x="3" y="3" fill="none" stroke="#00FF88" stroke-width="0.5" rx="15" opacity="0.2"/>

  <!-- Corner accents -->
  <line x1="0" y1="40" x2="40" y2="0" stroke="#25D366" stroke-width="1" opacity="0.4"/>
  <line x1="560" y1="0" x2="600" y2="40" stroke="#25D366" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="260" x2="40" y2="300" stroke="#25D366" stroke-width="1" opacity="0.4"/>
  <line x1="560" y1="300" x2="600" y2="260" stroke="#25D366" stroke-width="1" opacity="0.4"/>

  <!-- Grid dots background -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#25D366" opacity="0.08"/>
  </pattern>
  <rect width="600" height="300" fill="url(#dots)" rx="18"/>

  <!-- WhatsApp icon circle -->
  <circle cx="90" cy="150" r="52" fill="#111" stroke="#25D366" stroke-width="2" filter="url(#glow)"/>
  <circle cx="90" cy="150" r="40" fill="url(#greenGrad)" filter="url(#strongGlow)"/>

  <!-- WhatsApp phone icon -->
  <path d="M90 120 
           C73 120 60 133 60 150 
           C60 156 62 162 65 167 
           L61 179 L74 175 
           C79 178 84 179 90 179 
           C107 179 120 166 120 150 
           C120 133 107 120 90 120Z" 
        fill="white" opacity="0.95"/>
  <path d="M78 140 C78 140 80 144 84 148 C88 152 92 154 92 154 L96 150 C97 149 99 149 100 150 L105 155 C106 156 106 158 105 159 C102 162 98 164 94 163 C87 162 79 156 74 149 C69 142 68 134 71 128 C72 124 74 122 76 121 C77 120 79 120 80 121 L85 126 C86 127 86 129 85 130 L81 134 C81 134 78 136 78 140Z" 
        fill="#25D366"/>

  <!-- Bot name - IMRAN BOT -->
  <text x="165" y="130" 
        font-family="'Courier New', monospace" 
        font-size="42" 
        font-weight="900" 
        fill="url(#greenGrad)" 
        filter="url(#strongGlow)"
        letter-spacing="4">IMRAN</text>

  <text x="165" y="175" 
        font-family="'Courier New', monospace" 
        font-size="42" 
        font-weight="900" 
        fill="url(#cyanGrad)"
        filter="url(#glow)"
        letter-spacing="8">BOT</text>

  <!-- Divider line -->
  <line x1="165" y1="190" x2="540" y2="190" stroke="url(#greenGrad)" stroke-width="1.5" opacity="0.6" filter="url(#softGlow)"/>

  <!-- Subtitle -->
  <text x="165" y="215" 
        font-family="'Courier New', monospace" 
        font-size="13" 
        fill="#25D366" 
        opacity="0.8"
        letter-spacing="2">WhatsApp Bot</text>

  <!-- Made by -->
  <text x="165" y="240" 
        font-family="'Courier New', monospace" 
        font-size="12" 
        fill="#888888"
        letter-spacing="1">Made by </text>
  <text x="234" y="240" 
        font-family="'Courier New', monospace" 
        font-size="12" 
        fill="#00FFFF"
        font-weight="bold"
        filter="url(#softGlow)"
        letter-spacing="1">IMRAN</text>

  <!-- Powered by Baileys -->
  <text x="165" y="262"
        font-family="'Courier New', monospace"
        font-size="11"
        fill="#444444"
        letter-spacing="1">Powered by Baileys Framework</text>

  <!-- Decorative dots right side -->
  <circle cx="555" cy="100" r="3" fill="#25D366" opacity="0.6" filter="url(#glow)"/>
  <circle cx="567" cy="115" r="2" fill="#00FFFF" opacity="0.4"/>
  <circle cx="550" cy="125" r="1.5" fill="#25D366" opacity="0.3"/>
  <circle cx="572" cy="90" r="1.5" fill="#00FFFF" opacity="0.3"/>

  <!-- Status indicator -->
  <circle cx="555" cy="200" r="5" fill="#25D366" filter="url(#glow)"/>
  <text x="565" y="204" 
        font-family="'Courier New', monospace" 
        font-size="10" 
        fill="#25D366"
        opacity="0.7">ONLINE</text>

  <!-- Version tag -->
  <rect x="480" y="255" width="80" height="22" rx="11" fill="#111" stroke="#25D366" stroke-width="1" opacity="0.8"/>
  <text x="520" y="270" 
        font-family="'Courier New', monospace" 
        font-size="10" 
        fill="#25D366"
        text-anchor="middle"
        letter-spacing="1">v1.0.0</text>
</svg>
